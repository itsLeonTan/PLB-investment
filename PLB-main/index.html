<script>
let time = 1500;

function updateTimer() {
    let m = Math.floor(time / 60);
    let s = time % 60;

    if (s < 10) s = "0" + s;

    document.getElementById("end-time").innerText =
        m + ":" + s + " minutes left";

    if (time > 0) {
        time--;
    }
}

setInterval(updateTimer, 1000);
</script>
